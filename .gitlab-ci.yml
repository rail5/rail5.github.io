image: alpine:latest

pages:
  stage: deploy
  script:
  - echo 'Nothing to do...'
  - cd public/deb/
  - echo "<html><body><div align=\"center\"><h1>Archive of BookThief+Liesel versions</h1><br><h3>Directory Listing:</h3><br><br>" > ./index.html
  - for i in `ls`; do if [ $i == 'index.html' ]; then   echo "skipping.."; else   space=" ";   nothing="";   filetitle="${i/_amd64/$nothing}";   filetitle="${filetitle/.deb/$nothing}";   filetitle="${filetitle/_/$space}";   filetitle="${filetitle/-/$space}"   echo "<a href='$i'>$filetitle</a><br>" >> ./index.html; fi; done
  - echo "</div></body></html>" >> ./index.html
  - cd ../win64
  - echo "<html><body><div align=\"center\"><h1>Archive of BookThief+Liesel versions (Windows)</h1><br><h3>Directory Listing:</h3><br><br>" > ./index.html
  - for i in `ls`; do if [ $i == 'index.html' ]; then   echo "skipping.."; else   echo "<a href='$i'>$i</a><br>" >> ./index.html;   echo "<html><body><div align=\"center\"><h1>Archive of BookThief+Liesel versions (Windows) [$i]</h1><br><h3>Directory Listing:</h3><br><br>" > ./$i/index.html";   for x in `ls $i`; do if [ $x == 'index.html' ]; then      echo "skipping..";   else     echo "<a href='$x'>$x</a><br>" >> ./$i/index.html;   fi; fi; done
  artifacts:
    paths:
    - public
  only:
  - master
